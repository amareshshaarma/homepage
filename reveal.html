<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reveal Animations — Amaresh Sharma</title>
  <style>
    /* Reusable reveal animation classes.
       Add class="reveal" to any element.
       JS below triggers .visible on scroll. */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s cubic-bezier(.23,1,.32,1), transform .7s cubic-bezier(.23,1,.32,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: .1s; }
    .reveal-delay-2 { transition-delay: .2s; }
    .reveal-delay-3 { transition-delay: .3s; }
    .reveal-delay-4 { transition-delay: .4s; }
  </style>
</head>
<body>
  <!--
    USAGE:
    1. Add this <link> to your page head:
       <link rel="stylesheet" href="reveal.html"> (or copy styles to style.css)

    2. Add class="reveal" to any element you want to animate on scroll:
       <div class="reveal reveal-delay-1">...</div>

    3. Include this script at bottom of page (or in script.js):
  -->
  <script>
    // Scroll reveal — attach to elements with class "reveal"
    const revealEls = document.querySelectorAll('.reveal');
    if (revealEls.length) {
      const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            revealObserver.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      revealEls.forEach(el => revealObserver.observe(el));
    }
  </script>
</body>
</html>
